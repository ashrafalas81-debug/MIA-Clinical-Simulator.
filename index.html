<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MIA Admin Simulator | Dr. Ashraf Alaa</title>
    <style>
        :root { --primary: #0a192f; --secondary: #172a45; --accent: #64ffda; --white: #e6f1ff; --bg: #020c1b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #8892b0; margin: 0; overflow: hidden; }
        .main-frame { background: var(--primary); width: 100vw; height: 100vh; display: grid; grid-template-rows: 60px 1fr; }
        .header { background: var(--secondary); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #1d3557; }
        .game-area { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; padding: 20px; }
        .visual-screen { background: #000; border-radius: 15px; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border: 3px solid var(--secondary); overflow: hidden; }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .admin-panel { position: fixed; top: 0; right: 0; width: 400px; height: 100%; background: #fff; color: #000; z-index: 1000; padding: 20px; display: none; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <button onclick="toggleAdmin()" style="position:fixed; bottom:10px; left:10px; z-index:2000; opacity:0.2;">⚙️ Admin</button>

    <div class="admin-panel" id="adminPanel">
        <h2>لوحة تحكم د. أشرف</h2>
        <p>عدل بيانات الحالة الحالية:</p>
        <label>History (Text):</label>
        <textarea id="edit-history"></textarea>
        <label>Visual Link (Video/GIF):</label>
        <input type="text" id="edit-visual" style="width:100%; margin-bottom:10px;">
        <button onclick="saveChanges()" style="background:var(--primary); color:#fff; width:100%;">حفظ التعديلات مؤقتاً</button>
        <p style="font-size:12px; color:red;">* ملحوظة: التعديل هنا وقتي، لحفظه للأبد لازم تنسخ الكود لـ GitHub.</p>
    </div>

    <div class="main-frame">
        <div class="header">
            <h1 style="color:var(--white); font-size:18px;">MEDICAL INTELLIGENCE ACADEMY</h1>
            <div id="timer" style="color:#ff6b6b; font-weight:bold;">10:00</div>
        </div>
        <div class="game-area">
            <div>
                <div class="visual-screen" id="screen">[ Awaiting Input ]</div>
                <div class="controls">
                    <button onclick="playAction('history')">📋 History</button>
                    <button id="l-btn" onclick="playAction('lachman')">🦵 Lachman</button>
                    <button id="m-btn" onclick="playAction('mcmurray')">🔈 McMurray</button>
                    <button onclick="submitDiag()" style="grid-column: span 4; background:var(--accent); color:#000; margin-top:10px;">✅ تقديم التشخيص</button>
                </div>
            </div>
            <div style="background:var(--secondary); padding:20px; border-radius:15px;">
                <h3 id="p-intro" style="color:var(--accent);">Loading Case...</h3>
                <div id="log-output" style="color:#fff; margin-top:20px; font-size:18px;"></div>
            </div>
        </div>
    </div>

    <script>
        let current = {
            history: "ألم في الجانب الخارجي للركبة عند المصارعين.",
            visual: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJmZzR6bnB6ZzR6ZzR6ZzR6ZzR6ZzR6ZzR6ZzR6ZzR6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxV1mE8H704/giphy.gif",
            lachman: "Positive: Soft end point.",
            mcmurray: "Negative"
        };

        function playAction(type) {
            const screen = document.getElementById('screen');
            const log = document.getElementById('log-output');
            
            // تفعيل الصوت
            let msg = new SpeechSynthesisUtterance(current[type]);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);

            // عرض الفيديو/الصورة
            if(type === 'history' && current.visual) {
                screen.innerHTML = `<img src="${current.visual}" style="width:100%;">`;
            } else {
                screen.innerHTML = `<div style="color:var(--accent)">[ PERFORMING ${type.toUpperCase()} ]</div>`;
            }

            log.innerHTML = `<b>${type.toUpperCase()}:</b><br>${current[type]}`;
        }

        function toggleAdmin() {
            let panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            document.getElementById('edit-history').value = current.history;
            document.getElementById('edit-visual').value = current.visual;
        }

        function saveChanges() {
            current.history = document.getElementById('edit-history').value;
            current.visual = document.getElementById('edit-visual').value;
            alert("تم التعديل في الصفحة بنجاح!");
            toggleAdmin();
        }

        document.getElementById('p-intro').innerText = "Case: Wrestler with lateral knee pain.";
    </script>
</body>
</html>
