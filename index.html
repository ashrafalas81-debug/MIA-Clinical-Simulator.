<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MIA Admin Simulator V8 | Dr. Ashraf Alaa</title>
    <style>
        :root { --primary: #0a192f; --secondary: #172a45; --accent: #64ffda; --white: #e6f1ff; --bg: #020c1b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #8892b0; margin: 0; overflow: hidden; }
        .main-frame { background: var(--primary); width: 100vw; height: 100vh; display: grid; grid-template-rows: 70px 1fr; border: 1px solid var(--secondary); }
        .header { background: var(--secondary); display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 2px solid var(--accent); }
        .admin-btn { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .game-area { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; padding: 20px; }
        .visual-screen { background: #000; border-radius: 15px; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border: 3px solid var(--secondary); overflow: hidden; box-shadow: 0 0 20px rgba(100,255,218,0.1); }
        .visual-screen img { width: 100%; height: 100%; object-fit: contain; }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        button.action-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .info-card { background: var(--secondary); padding: 20px; border-radius: 15px; border-right: 5px solid var(--accent); height: 100%; }
        
        /* لوحة التحكم الجانبية */
        .admin-panel { position: fixed; top: 0; right: 0; width: 350px; height: 100%; background: #f1f2f6; color: #2f3542; z-index: 9999; padding: 20px; display: none; box-shadow: -10px 0 30px rgba(0,0,0,0.5); border-left: 5px solid #ff4757; }
        .admin-panel h2 { color: #ff4757; margin-top: 0; }
        .admin-panel label { font-weight: bold; display: block; margin-top: 15px; }
        .admin-panel textarea, .admin-panel input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ced4da; }
        .save-btn { background: #2ed573; color: white; border: none; width: 100%; padding: 15px; margin-top: 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-panel" id="adminPanel">
        <h2>إعدادات الحالة الحالية</h2>
        <label>نص التاريخ المرضي (History):</label>
        <textarea id="edit-history"></textarea>
        
        <label>ميكانيكية الإصابة (Mechanism):</label>
        <textarea id="edit-mechanism"></textarea>

        <label>رابط الصورة/الفيديو (URL):</label>
        <input type="text" id="edit-visual" placeholder="ضع رابط الصورة هنا">

        <button class="save-btn" onclick="saveAdmin()">حفظ التعديلات في المحاكي</button>
        <button onclick="toggleAdmin()" style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer; color:#747d8c;">إغلاق X</button>
    </div>

    <div class="main-frame">
        <div class="header">
            <h1 style="color:var(--white); font-size:20px;">MEDICAL INTELLIGENCE ACADEMY</h1>
            <div>
                <button class="admin-btn" onclick="toggleAdmin()">⚙️ فتح لوحة التحكم</button>
            </div>
        </div>

        <div class="game-area">
            <div>
                <div class="visual-screen" id="screen">
                    <p id="placeholder-text" style="color:#444;">[ في انتظار البيانات البصرية... ]</p>
                </div>
                <div class="controls">
                    <button class="action-btn" onclick="playAction('history')">📋 History</button>
                    <button class="action-btn" onclick="playAction('mechanism')">⚙️ Mechanism</button>
                    <button class="action-btn" onclick="playAction('lachman')">🦵 Lachman</button>
                    <button class="action-btn" onclick="playAction('mcmurray')">🔈 McMurray</button>
                    <button onclick="submitDiag()" style="grid-column: span 4; background:var(--accent); color:#000; border:none; padding:15px; margin-top:10px; font-weight:bold; cursor:pointer;">✅ تقديم التشخيص النهائي</button>
                </div>
            </div>

            <div class="info-card">
                <h3 style="color:var(--accent); margin-top:0;">📝 سجل الفحص السريري:</h3>
                <div id="log-output" style="color:var(--white); font-size:18px; line-height:1.6;">
                    ابدأ بجمع البيانات يا دكتور.. التعديلات التي تجريها في لوحة التحكم ستظهر هنا فوراً.
                </div>
            </div>
        </div>
    </div>

    <script>
        // بيانات الحالة الابتدائية
        let currentData = {
            history: "المريض يشتكي من ألم حاد بعد التواء مفاجئ في الركبة.",
            mechanism: "إصابة غير مباشرة نتيجة دوران المفصل (Pivot) أثناء الجري.",
            visual: "https://media.giphy.com/media/3o7TKMGpxV1mE8H704/giphy.gif",
            lachman: "Positive: Increased anterior translation.",
            mcmurray: "Negative: No clicking heard."
        };

        function playAction(type) {
            const screen = document.getElementById('screen');
            const log = document.getElementById('log-output');
            let content = currentData[type];

            // 1. تشغيل الصوت الآلي
            let msg = new SpeechSynthesisUtterance(content);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);

            // 2. تحديث الشاشة
            if(type === 'history' || type === 'mechanism') {
                screen.innerHTML = `<img src="${currentData.visual}">`;
            } else {
                screen.innerHTML = `<div style="color:var(--accent); font-weight:bold;">[ يتم الآن إجراء فحص ${type.toUpperCase()} ]</div>`;
            }

            // 3. تحديث النص
            log.innerHTML = `<b style="color:var(--accent);">${type.toUpperCase()}:</b><br>${content}`;
        }

        function toggleAdmin() {
            let panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            
            // تعبئة البيانات الحالية في اللوحة
            document.getElementById('edit-history').value = currentData.history;
            document.getElementById('edit-mechanism').value = currentData.mechanism;
            document.getElementById('edit-visual').value = currentData.visual;
        }

        function saveAdmin() {
            currentData.history = document.getElementById('edit-history').value;
            currentData.mechanism = document.getElementById('edit-mechanism').value;
            currentData.visual = document.getElementById('edit-visual').value;
            
            alert("تم تحديث بيانات المحاكي بنجاح!");
            toggleAdmin();
        }

        function submitDiag() {
            alert("سيتم تقييم تشخيصك بناءً على البيانات الحالية.");
        }
    </script>
</body>
</html>
